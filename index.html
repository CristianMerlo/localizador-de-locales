<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Buscador de Locales - Mostaza">
    <title>Buscador de Locales | Mostaza</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Core Styles -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

    <!-- Header Section -->
    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <h1>Buscador <span>de Locales</span></h1>
                <p class="subtitle">Acceso instantáneo a la base de datos de sucursales</p>
            </div>
            <div class="logo-box">
                <img src="img/logo.png" alt="Mostaza Logo" id="main-logo">
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="fade-in">
        <div class="container">
            
            <div class="card search-module-card fade-in">
                <div class="search-hero-section">
                    <div class="main-search-wrapper">
                        <i class="fa-solid fa-magnifying-glass search-icon-main"></i>
                        <input type="text" id="store-search-input" placeholder="Buscar local por nombre, sigla, provincia o supervisor..." autocomplete="off">
                    </div>
                    <div id="search-results-count" class="results-info-premium">Comienza a escribir para buscar sucursales...</div>
                </div>

                <div id="stores-grid" class="stores-results-grid">
                    <!-- Search results will appear here -->
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <p>&copy; 2026 Mostaza - Mantenimiento</p>
    </footer>

    <!-- Scripts -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
